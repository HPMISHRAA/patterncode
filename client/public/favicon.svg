<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- Rounded Square background with yellow/orange gradient -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#yellowGradient)" />
  
  <!-- Code brackets `<` and `>` in black -->
  <path d="M24 22L14 32L24 42" stroke="black" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M40 22L50 32L40 42" stroke="black" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

  <defs>
    <linearGradient id="yellowGradient" x1="32" y1="2" x2="32" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFCE00" />
      <stop offset="100%" stop-color="#E59400" />
    </linearGradient>
